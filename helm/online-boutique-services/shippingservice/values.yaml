deploymentName: shippingservice-deployment
serviceName: shippingservice

appLabel: shippingservice
appName: shippingservice
jobLabel: shippingservice

replicaCount: 1

image:
  repository: ghcr.io/tanya-domi/shippingservice
  tag: "docker-18816493323"
  pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: my-registry-key

annotations:
  instrumentation.opentelemetry.io/inject-go: app-instrumentation
  instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/src/shippingservice"

shareProcessNamespace: true
containers:
  - name: server
    ports:
      - containerPort: 50051
    securityContext:
          privileged: true
    env:
      - name: PORT
        value: "50051"
      - name: DISABLE_PROFILER
        value: "1"
    readinessProbe:
      periodSeconds: 5
      grpc:
        port: 50051
    livenessProbe:
      grpc:
        port: 50051
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 50051
  targetPort: 50051

serviceAccount:
  create: true
  name: "shippingservice"

profiler_enabled: "false"
