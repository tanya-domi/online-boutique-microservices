deploymentName: redis-deployment
serviceName: redis-cart

appLabel: redis-cart
appName: redis-cart
jobLabel: redis-cart

replicaCount: 1

redisName:
  name: redis-cart
  port: 6379
  image:
    repository: redis
    tag: "7.2"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

service:
  type: ClusterIP
  name: tcp-redis
  port: 6379
  targetPort: 6379

serviceAccount:
  create: true
  name: "redis-cart"

profiler_enabled: "false"

