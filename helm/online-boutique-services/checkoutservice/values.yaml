deploymentName: checkoutservice-deployment
serviceName: checkoutservice

appLabel: checkoutservice
appName: checkoutservice
jobLabel: checkoutservice

replicaCount: 1

image:
  repository: ghcr.io/tanya-domi/checkoutservice
  tag: "docker-18816493323"
  pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: my-registry-key

annotations:
  instrumentation.opentelemetry.io/inject-go: "app-instrumentation"
  instrumentation.opentelemetry.io/otel-go-auto-target-exe: "/src/checkoutservice"

shareProcessNamespace: true
containers:
  - name: server
    ports:
      - containerPort: 5050
    securityContext:
          privileged: true

    readinessProbe:
      grpc:
        port: 5050
    livenessProbe:
      grpc:
        port: 5050
    env:
      - name: PORT
        value: "5050"
      - name: PRODUCT_CATALOG_SERVICE_ADDR
        value: "productcatalogservice:3550"
      - name: SHIPPING_SERVICE_ADDR
        value: "shippingservice:50051"
      - name: PAYMENT_SERVICE_ADDR
        value: "paymentservice:50051"
      - name: EMAIL_SERVICE_ADDR
        value: "emailservice:5000"
      - name: CURRENCY_SERVICE_ADDR
        value: "currencyservice:7000"
      - name: CART_SERVICE_ADDR
        value: "cartservice:7070"
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 5050
  targetPort: 5050

serviceAccount:
  create: true
  name: "checkoutservice"

profiler_enabled: "false"
