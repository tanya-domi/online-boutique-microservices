deploymentName: currencyservice-deployment
serviceName: currencyservice

appLabel: currencyservice
appName: currencyservice
jobLabel: currencyservice

replicaCount: 1

image:
  repository: ghcr.io/tanya-domi/currencyservice
  tag: "docker-18816493323"
  pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: my-registry-key

annotations:
  instrumentation.opentelemetry.io/inject-nodejs: "app-instrumentation"

containers:
  - name: server
    ports:
      - containerPort: 7000
    env:
      - name: PORT
        value: "7000"
      - name: DISABLE_PROFILER
        value: "1"
    readinessProbe:
      grpc:
        port: 7000
    livenessProbe:
      grpc:
        port: 7000
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 7000
  targetPort: 7000

serviceAccount:
  create: true
  name: "currencyservice"

profiler_enabled: "false"
