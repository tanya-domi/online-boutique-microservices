deploymentName: recommendationservice-deployment
serviceName: recommendationservice

appLabel: recommendationservice
appName: recommendationservice
jobLabel: recommendationservice

replicaCount: 1

image:
  repository: ghcr.io/tanya-domi/recommendationservice
  tag: "docker-18816493323"
  pullPolicy: IfNotPresent
  imagePullSecrets:
    - name: my-registry-key

annotations:
  instrumentation.opentelemetry.io/inject-python: "app-instrumentation"

containers:
  - name: server
    ports:
      - containerPort: 8080
    readinessProbe:
      periodSeconds: 5
      grpc:
        port: 8080
    livenessProbe:
      periodSeconds: 5
      grpc:
        port: 8080
    env:
      - name: PORT
        value: "8080"
      - name: PRODUCT_CATALOG_SERVICE_ADDR
        value: "productcatalogservice:3550"
      - name: DISABLE_PROFILER
        value: "1"
    resources:
      requests:
        cpu: 100m
        memory: 220Mi
      limits:
        cpu: 200m
        memory: 450Mi

service:
  enabled: true
  type: ClusterIP
  name: grpc
  port: 8080
  targetPort: 8080

serviceAccount:
  create: true
  name: "recommendationservice"
  
profiler_enabled: "false"
