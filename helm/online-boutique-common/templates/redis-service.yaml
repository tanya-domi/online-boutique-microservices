{{- define "common.redis-service" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.appLabel }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.appLabel }}
  ports:
    - name: tcp-redis
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
{{- end -}}
