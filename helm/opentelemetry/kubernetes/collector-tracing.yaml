apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: trace-collector
spec:
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.131.1
  
  mode: deployment # or daemonset
  
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

            cors:  #added the cors block to your http receiver and kept your type: LoadBalancer
              allowed_origins:
                - "http://*"
                - "https://*"
            
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      batch:
        send_batch_size: 10000
        timeout: 10s

    exporters:
      # NOTE: Prior to v0.86.0 use `logging` instead of `debug`.
      debug: {}
      otlp/tempo:
        endpoint: "http://tempo-distributor.grafana.svc.cluster.local:4317"
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: "http://prometheus-operated.monitoring.svc:9090/api/v1/write"
        tls:
          insecure: true
          insecure_skip_verify: 

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug, otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheusremotewrite]

--- 

apiVersion: v1
kind: Service
metadata:
  name: trace-collector-lb
  namespace: monitoring
spec:
  type: LoadBalancer
  selector:
    # These labels are automatically applied to pods by the OTel Operator
    app.kubernetes.io/name: trace-collector-collector
    app.kubernetes.io/instance: monitoring.trace-collector
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318