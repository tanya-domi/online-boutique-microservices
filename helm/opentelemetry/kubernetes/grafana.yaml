datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: main
      type: prometheus
      url: http://prometheus-operated.monitoring.svc.cluster.local:9090
      access: proxy
      isDefault: true
      jsonData:
        httpMethod: GET

    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo-query-frontend.tempo.svc.cluster.local:3100
      jsonData:
        tracesToLogsV2:
          datasourceUid: "Elasticsearch"   
        serviceMap:
          datasourceUid: "main"
        nodeGraph:
          enabled: true

    - name: Elasticsearch
      type: elasticsearch
      access: proxy
      url: http://elasticsearch.efk.svc.cluster.local:9200
      jsonData:
        interval: Daily
        timeField: "@timestamp"

    


